        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#viz");
        const g = svg.append("g");

        // Zoom interativo
        svg.call(d3.zoom().on("zoom", (event) => {
            g.attr("transform", event.transform);
        }));

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.links).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-150))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(30));

        const link = g.append("g")
            .selectAll("line")
            .data(data.links)
            .enter().append("line")
            .attr("stroke", "#2d3748")
            .attr("stroke-opacity", 0.4)
            .attr("stroke-width", 1);

        const node = g.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .enter().append("circle")
            .attr("r", 6)
            .attr("fill", d => d.color)
            .attr("class", "node")
            .style("filter", "drop-shadow(0 0 5px currentColor)")
            .on("mouseover", showTooltip)
            .on("mouseout", hideTooltip)
            .on("click", (e, d) => window.open(d.url, '_blank'));

        // Animação de brilho
        function pulse() {
            node.transition()
                .duration(2000)
                .attr("r", 8)
                .transition()
                .duration(2000)
                .attr("r", 6)
                .on("end", pulse);
        }
        pulse();

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        });

        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            document.getElementById('t-title').innerText = d.title;
            document.getElementById('t-author').innerText = d.author;
            document.getElementById('t-category').innerText = d.category;
            document.getElementById('t-category').style.backgroundColor = d.color;
            document.getElementById('t-abstract').innerText = d.abstract;
            
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 15) + 'px';
            tooltip.style.top = (event.pageY + 15) + 'px';
            
            d3.select(event.currentTarget).attr("r", 12).attr("stroke", "white").attr("stroke-width", 2);
        }

        function hideTooltip(event) {
            document.getElementById('tooltip').style.display = 'none';
            d3.select(event.currentTarget).attr("r", 6).attr("stroke", "none");
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr("width", w).attr("height", h);
            simulation.force("center", d3.forceCenter(w / 2, h / 2)).alpha(0.3).restart();
        });
    </script>
</body>
</html>
